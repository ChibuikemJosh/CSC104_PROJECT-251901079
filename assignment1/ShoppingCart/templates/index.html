<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.container{
    display:flex;
    gap:30px;
}

.products-section,
.cart-section{
    flex:1;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.product,
.cart-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:6px;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
}

.add-btn{
    background:#2563eb;
}

.remove-btn{
    background:#dc2626;
}

h3{
    margin-top:20px;
}
    </style>
</head>
<body>

    <h1>🛒 Dynamic Shopping Cart</h1>

    <div class="container">

        <div class="products-section">
            <h2>Products</h2>

            <div id="products"></div>
        </div>

        <div class="cart-section">
            <h2>Shopping Cart</h2>

            <div id="cart-items"></div>

            <h3>Total: ₦<span id="total">0</span></h3>
        </div>

    </div>

    <script>
        const products = [
    {
        id: 1,
        name: "Laptop",
        price: 350000
    },
    {
        id: 2,
        name: "Mouse",
        price: 15000
    },
    {
        id: 3,
        name: "Keyboard",
        price: 25000
    },
    {
        id: 4,
        name: "Headphones",
        price: 40000
    },
    {
        id: 5,
        name: "Monitor",
        price: 120000
    }
];

const cart = [];

const productsContainer =
    document.getElementById("products");

const cartContainer =
    document.getElementById("cart-items");

const totalElement =
    document.getElementById("total");

function renderProducts() {

    productsContainer.innerHTML = "";

    products.forEach(product => {

        const div = document.createElement("div");

        div.classList.add("product");

        div.innerHTML = `
            <span>
                ${product.name}
                - ₦${product.price.toLocaleString()}
            </span>

            <button
                class="add-btn"
                onclick="addToCart(${product.id})"
            >
                Add to Cart
            </button>
        `;

        productsContainer.appendChild(div);
    });
}

function addToCart(id) {

    const product =
        products.find(p => p.id === id);

    cart.push(product);

    renderCart();
}

function removeFromCart(index) {

    cart.splice(index, 1);

    renderCart();
}

function renderCart() {

    cartContainer.innerHTML = "";

    let total = 0;

    cart.forEach((item, index) => {

        total += item.price;

        const div = document.createElement("div");

        div.classList.add("cart-item");

        div.innerHTML = `
            <span>
                ${item.name}
                - ₦${item.price.toLocaleString()}
            </span>

            <button
                class="remove-btn"
                onclick="removeFromCart(${index})"
            >
                Remove
            </button>
        `;

        cartContainer.appendChild(div);
    });

    totalElement.textContent =
        total.toLocaleString();
}

renderProducts();
    </script>

</body>
</html>
